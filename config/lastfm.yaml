top_artists:
  # Sized to actual listening (heavy/broad: 6,445 artists all-time, 416/year,
  # 131/quarter). Each chart serves a role; recency drives genre, all-time drives
  # exclusion. SKILL.md's genre step weights these by recency — keep them in sync.
  - period: 1month    # recency / current-obsession signal (heaviest genre weight)
    limit: 35         # knee at ~34 artists with >=5 plays/month
  - period: 3month    # current genre profile + fan-out seeds
    limit: 50         # both jobs saturate under 50
  - period: 12month   # medium-term genre context only (light weight)
    limit: 50
  - period: overall   # comprehensive all-time recognition net, not a genre signal.
    limit: 1000       # widest the connector returns (1000 of 6,445; floor ~14
                      # plays). Down-weighted out of the genre lean in SKILL.md so
                      # it can't drown recency. Its job is "do I already know this
                      # artist?" — wider is strictly better: it routes known
                      # artists (incl. dormant favorites) into section_a rather
                      # than misfiling their new releases as discoveries.

recommendations:
  limit: 50

similar_artists:
  # fan out the top N of the 3month and overall charts
  top_n: 20
  limit: 50

# Implicit feedback (issue #25): after the explicit feedback read, probe Last.fm
# for whether prior picks actually got played, and fold the result into the same
# curation steer. The lookback set comes from the #17 history corpus (no new
# store) — recent picks read back; each distinct release is probed with one
# get_album_info(artist, album, username) call, which returns the user's album
# playcount and the album's track count. The ratio userplaycount / track_count
# is the signal. SKILL.md's "Incorporate play-back signal" step reads these —
# keep them in sync.
#   - records: how many recent production history records to look back over.
#   - max_releases: cap on distinct releases probed (one get_album_info each),
#     so the extra calls stay modest vs. the listening fan-out. Picks are
#     prioritized top_5 > section_b (discovery) > section_a > kept candidates.
#   - finished_ratio: ratio at/above which the album counts as "listened
#     through" (a positive signal). BELOW it, a non-zero playcount is a
#     partial/unfinished listen — they sampled it and stopped — and is NOT
#     treated as positive (see the #25 comment).
#   - repeat_ratio: ratio at/above which the release counts as a repeated /
#     multiple-listen play — the strongest positive signal.
playback_lookback:
  records: 4
  max_releases: 12
  finished_ratio: 0.8
  repeat_ratio: 1.8

# Test-mode breadth trim (NMF_TEST=1). The on-merge smoke test runs the full
# path on the production model, but a few reads dominate wall-clock. In test mode
# SKILL.md uses these reduced values; production ignores this block.
#   - similar_artists: the fan-out (top_n x 2 charts) is the run's single biggest
#     source of MCP round-trips. Test mode uses the 3month chart only (skips the
#     overall fan-out) with a smaller top_n, so the path is still exercised with
#     far fewer calls.
#   - top_artists: the production overall chart pulls 1000 rows — the heaviest
#     single Last.fm payload. Test mode drops 12month (light context) and caps
#     overall at 150, keeping the genre lean (1month/3month) and the recognition
#     net intact while cutting the read.
#   - playback_lookback: fewer records and a smaller probe cap so the implicit
#     feedback path is still exercised with fewer get_album_info calls. The ratio
#     thresholds are not duplicated here — SKILL.md always reads finished_ratio /
#     repeat_ratio from the top-level block.
test_mode:
  top_artists:
    - period: 1month
      limit: 35
    - period: 3month
      limit: 50
    - period: overall
      limit: 150
  similar_artists:
    top_n: 5
    limit: 50
  playback_lookback:
    records: 2
    max_releases: 4
