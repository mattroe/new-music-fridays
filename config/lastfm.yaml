top_artists:
  # Sized to actual listening (heavy/broad: 6,445 artists all-time, 416/year,
  # 131/quarter). Each chart serves a role; recency drives genre, all-time drives
  # exclusion. SKILL.md's genre step weights these by recency — keep them in sync.
  - period: 1month    # recency / current-obsession signal (heaviest genre weight)
    limit: 35         # knee at ~34 artists with >=5 plays/month
  - period: 3month    # current genre profile + fan-out seeds
    limit: 50         # both jobs saturate under 50
  - period: 12month   # medium-term genre context only (light weight)
    limit: 50
  - period: overall   # comprehensive all-time recognition net, not a genre signal.
    limit: 1000       # widest the connector returns (1000 of 6,445; floor ~14
                      # plays). Down-weighted out of the genre lean in SKILL.md so
                      # it can't drown recency. Its job is "do I already know this
                      # artist?" — wider is strictly better: it routes known
                      # artists (incl. dormant favorites) into section_a rather
                      # than misfiling their new releases as discoveries.

recommendations:
  limit: 50

similar_artists:
  # fan out the top N of the 3month and overall charts
  top_n: 20
  limit: 50

# Test-mode breadth trim (NMF_TEST=1). The on-merge smoke test runs the full
# path on the production model, but a few reads dominate wall-clock. In test mode
# SKILL.md uses these reduced values; production ignores this block.
#   - similar_artists: the fan-out (top_n x 2 charts) is the run's single biggest
#     source of MCP round-trips. Test mode uses the 3month chart only (skips the
#     overall fan-out) with a smaller top_n, so the path is still exercised with
#     far fewer calls.
#   - top_artists: the production overall chart pulls 1000 rows — the heaviest
#     single Last.fm payload. Test mode drops 12month (light context) and caps
#     overall at 150, keeping the genre lean (1month/3month) and the recognition
#     net intact while cutting the read.
test_mode:
  top_artists:
    - period: 1month
      limit: 35
    - period: 3month
      limit: 50
    - period: overall
      limit: 150
  similar_artists:
    top_n: 5
    limit: 50
