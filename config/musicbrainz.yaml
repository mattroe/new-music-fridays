# MusicBrainz verification (issue #51, Phase 1). After web-research discovery,
# SKILL.md resolves each kept candidate against the open MusicBrainz database to
# verify it exists and read its release-group first-release-date — catching
# hallucinated/mis-dated picks and demoting reissues. It is a curation SIGNAL,
# never a veto, and never a citation source. See SKILL.md's "Verify candidates
# against MusicBrainz" step. No secret: reads need only a descriptive User-Agent.
#
# Requires one environment step the repo can't provision: add `musicbrainz.org`
# to the routine's Custom Network-access allowlist (see CLAUDE.md). Until then the
# step fails fast and the run proceeds exactly as today.

# Master switch. Default on — safe because the step is fail-soft (MB down ->
# all-unverified, email still ships) and fails fast on a proxy 403 (host not yet
# allowlisted -> ~0.5s, not paced 403s). Set false to disable entirely (kill switch).
enabled: true

# MusicBrainz Lucene match-score floor (0-100) to accept a search hit. Higher is
# stricter (fewer false matches on common titles); lower resolves more but risks
# mis-hits. Tune on the first cloud run.
min_score: 90

# --- Phase 2 enrichment (issues #58, #61). Each switch adds ONE extra paced
# (~1 req/s) MusicBrainz lookup per *resolved* candidate, on top of the Phase 1
# search. Same resilience as verification: fail-soft per candidate, 403-fail-fast,
# no secret, the `musicbrainz.org` allowlist host already covers them. They are
# additive curation SIGNALS only — never a veto, never a citation source. Default
# on, like `enabled`; flip either to false to skip its lookup (e.g. if the added
# wall-clock bites, or to isolate one signal). The master `enabled` switch gates
# all of MusicBrainz, including these.

# Authoritative label (issue #58, part 2). When on, resolve the release-group's
# releases (`release?release-group=<mbid>&inc=labels`) to read the canonical
# label/imprint. SKILL.md prefers this over the web-scraped label when present
# ("MB wins when resolved") — a reliability gain on the rendered label field.
enrich_labels: true

# Coverage-gap probe (issue #71 item 3, DIAGNOSTIC). After research + verification,
# SKILL.md enumerates what your recency-chart artists actually released this window
# (via `musicbrainz.mjs --enumerate-by-artist`) and counts how many of those the
# editorial/web sweep MISSED — quantifying whether the candidate universe is
# editor-gated. It is diagnostic ONLY: the missed releases are logged (candidates.md
# + the history record's `coverage_gap`), never added to the digest this run.
# Turning them into a live coverage source is the next, evidence-gated step.
# Reuses the same musicbrainz.org host, so the master `enabled` switch gates it too;
# set `coverage_probe.enabled: false` to skip just the probe.
#   - max_artists: cap on recency-chart artists to enumerate (2 paced MB calls
#     each), keeping the probe's added wall-clock modest next to the listening fan-out.
#   - test_mode.max_artists: a smaller cap so the smoke test exercises the path
#     with fewer enumerate calls.
coverage_probe:
  enabled: true
  max_artists: 40
  test_mode:
    max_artists: 8

# Credit overlap + coverage probe (issue #61, MVP slice). When on, pull the
# release-group's personnel (`release-group/<mbid>?inc=artist-rels`) — producers,
# engineers, songwriters, collaborators — distilled to names/roles/MBIDs only (no
# MB free-text). SKILL.md annotates kept candidates whose personnel overlap an
# artist you already listen to ("produced by X, whom you play"), feeding the
# section-A producer/collaborator rationale, and records how well-populated
# new-release credits are. This coverage measurement gates the deferred discovery
# fan-out (#61) — keep it on for a few weeks to quantify before that's built.
enrich_credits: true
